[workspace]
members = [
    "crates/core",
    "crates/transport",
    "crates/discovery",
    "crates/routing",
]

resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
authors = ["Dawn Bridge Labs"]
description = "Censorship-resistant multi-transport framework with AI-driven routing."

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
